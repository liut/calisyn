apiVersion: apps/v1
kind: Deployment
metadata:
  name: calisyn
  labels:
    app: calisyn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calisyn
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: calisyn
    spec:
      containers:
        - image: liut7/calisyn
          name: calisyn
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: LLM_PROVIDER
              value: openai
            - name: LLM_API_KEY
              value: sk-xxx
            - name: LLM_BASE_URL
              value: 'https://api.openai.com/v1'
            - name: LLM_MODEL
              value: gpt-4.1
            - name: AUTH_SECRET_KEY
              value: '123456'
            - name: LLM_TIMEOUT_MS
              value: '60000'
              value: ''
            - name: HTTPS_PROXY
              value: ''
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 300m
              memory: 300Mi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: calisyn
  name: calisyn
spec:
  ports:
    - name: calisyn
      port: 3002
      protocol: TCP
      targetPort: 3002
  selector:
    app: calisyn
  type: ClusterIP
